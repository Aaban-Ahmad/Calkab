<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us</title>
    <style>
        /* Base styles matching a clean, modern aesthetic */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f7f6;
            color: #333;
            line-height: 1.6;
        }

        /* Navigation Bar Layout */
        nav {
            background-color: #2c3e50;
            padding: 1rem 2rem;
            display: flex;
            justify-content: center;
            gap: 20px;
        }

        nav a {
            color: #fff;
            text-decoration: none;
            font-weight: 600;
            font-size: 1.1rem;
            transition: color 0.3s ease;
        }

        nav a:hover {
            color: #1abc9c;
        }

        /* Main Content Container */
        .container {
            max-width: 600px;
            margin: 50px auto;
            padding: 30px;
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
            text-align: center;
        }

        h1 {
            color: #2c3e50;
            margin-bottom: 10px;
        }

        p {
            color: #7f8c8d;
            margin-bottom: 30px;
        }

        /* Contact Details/Form Setup */
        .contact-info {
            margin-top: 20px;
            font-size: 1.1rem;
        }

        .contact-info a {
            color: #1abc9c;
            text-decoration: none;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <nav>
        <a href="index.html">Home</a>
        <a href="contact.html">Contact</a>
    </nav>
    
    <div class="container">
        <h1>Get in Touch</h1>
        <p>Have a question or want to work together? We'd love to hear from you.</p>
        
        <div class="contact-info">
            <p>📧 Email: <a href="mailto:hello@example.com">hello@example.com</a></p>
        </div>
    </div>

</body>
</html>
